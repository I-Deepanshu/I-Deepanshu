name: Latest Blog Posts

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Medium posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@deepanshusnpt"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: BLOG POSTS
          template: "- [$title]($url) — $date"
          date_format: "MMM DD, YYYY"

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git diff --quiet && git diff --staged --quiet || (git add README.md && git commit -m "chore: update latest blog posts" && git push)
